<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitPulse - Your Fitness Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      padding: 2rem;
    }

    nav {
      background: rgba(255, 255, 255, 0.95);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    nav .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2c3e50;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav ul li a {
      text-decoration: none;
      color: #2c3e50;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: #5d9cec;
    }

    .content {
      text-align: center;
      color: #fff;
      max-width: 800px;
      margin: 100px auto 0 auto;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.5); /* enhanced visibility */
      border-radius: 20px;
    }

    .content h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 1px 1px 3px #000;
    }

    .content p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      text-shadow: 1px 1px 2px #000;
    }

    .content button {
      background: #5d9cec;
      color: white;
      border: none;
      padding: 0.8rem 1.8rem;
      font-size: 1rem;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .content button:hover {
      background: #4a8ad4;
    }

    @media screen and (max-width: 768px) {
      nav ul {
        flex-direction: column;
        gap: 0.5rem;
      }

      .content h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">FitPulse</div>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="body.html">Body Check</a></li>
      <li><a href="fitness.html">Fitness Plan</a></li>
      <li><a href="progress.html">Progress</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <div class="content">
    <h1>Welcome to FitPulse</h1>
    <p>Your personalized fitness monitor for a healthier tomorrow.</p>
    <button onclick="location.href='login.html'">Get Started</button>
  </div>
</body>
</html>
